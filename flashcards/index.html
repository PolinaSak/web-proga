<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Flash-cards</title>
</head>
<body>
    <h1>Flash-cards</h1>
    <p id="hi-message">Create your first deck!</p>
    <button id="add-deck">Add Desk</button>
    <div id="deckList"></div>

    <div class="add-card-form">
        <input type="text" id="card-front">
        <input type="text" id="card-back">


        <button id="add-card-button">Add card</button>
    </div>
    
    <div class="game-buttons">
        <button id="new-all-card-game">New game (all cards)</button>
        <button id="new-nonlearned-game"> New Game (only unlearned)</button>
    </div>
    <p id="error-message" style="color: red;"></p>

    <div id="cards-list"></div>

    <script src="app.js"></script>
</body>
</html>
