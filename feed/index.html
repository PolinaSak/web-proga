<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горизонтальная галерея фото</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Photo Feed</h1>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Поиск изображений...">
    </div>

    <div class="gallery-wrapper" id="gallery-wrapper">
        <div id="gallery-container">
            <div id="sentinel"></div>
        </div>
    </div>

    <button class="nav-btn" id="prev-btn">&#10094;</button>
    <button class="nav-btn" id="next-btn">&#10095;</button>

    <div class="status-area">
        <div id="status-loading" class="status-msg loading">Загрузка новых фото...</div>
        <div id="status-error" class="status-msg error"></div>
        <div id="status-empty" class="status-msg empty">Ничего не найдено :(</div>
    </div>

<script src="scr.js"></script>
</body>
</html>
